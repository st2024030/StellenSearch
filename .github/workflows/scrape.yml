name: StellenRobot Scraper

on:
  schedule:
    # Läuft 3 mal am Tag (8:00, 13:00, 18:00 UTC)
    - cron: '0 8,13,18 * * *'
  workflow_dispatch: # Erlaubt manuelles Starten

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wichtig, um die jobs.db zurückzuschreiben

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Robot ausführen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SERVICE_BUND_SEARCH_URL: ${{ secrets.SERVICE_BUND_SEARCH_URL }}
          BUNDESPOLIZEI_SEARCH_URL: ${{ secrets.BUNDESPOLIZEI_SEARCH_URL }}
          BKA_SEARCH_URL: ${{ secrets.BKA_SEARCH_URL }}
        run: python main.py

      - name: Änderungen speichern (Persistence)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add jobs.db
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update jobs.db [skip ci]" && git push)
